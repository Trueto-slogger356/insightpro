stages:
  - test
  - build

backend:test:
  image: python:3.12
  stage: test
  script:
    - pip install -r backend/requirements.txt
    - PYTHONPATH=backend python -m compileall backend/app

frontend:build:
  image: node:22
  stage: build
  script:
    - cd frontend
    - npm ci
    - npm run build
